<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos Kanban</title>
  <link rel="stylesheet" href="/kanban.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Markdown Sync</p>
        <h1>Todos als Kanban</h1>
        <p class="topbar-copy">Dein Board bleibt direkt mit <code>Todos.md</code> verbunden.</p>
      </div>
      <div class="topbar-actions">
        <details class="view-menu">
          <summary id="viewMenuButton" class="ghost-button">Ansicht</summary>
          <div class="view-menu-panel">
            <button id="mobileModeButton" class="menu-button" type="button" aria-pressed="false">iPhone-Minimodus</button>
            <button id="toggleDoneButton" class="menu-button" type="button" aria-pressed="false">Erledigt anzeigen</button>
          </div>
        </details>
        <button id="refreshButton" class="ghost-button" type="button">Neu laden</button>
        <button id="addButton" class="primary-button" type="button">Todo anlegen</button>
      </div>
    </header>

    <section class="status-strip">
      <div class="status-card">
        <span class="status-label">Letztes Update</span>
        <strong id="updatedAt">-</strong>
      </div>
      <div class="status-card">
        <span class="status-label">Karten</span>
        <strong id="cardCount">0</strong>
      </div>
      <div class="status-card accent-card">
        <span class="status-label">Status</span>
        <strong id="syncState">Bereit</strong>
      </div>
    </section>

    <section class="filters">
      <label class="search-field">
        <span>Suche</span>
        <input id="searchInput" type="search" placeholder="Titel, Kategorie oder Priorität">
      </label>
      <div class="segment-group" id="categoryFilters"></div>
      <div class="segment-group" id="priorityFilters"></div>
    </section>

    <main class="board-wrap">
      <div id="board" class="board" aria-live="polite"></div>
    </main>
  </div>

  <dialog id="todoDialog" class="todo-dialog">
    <form id="todoForm" method="dialog" class="todo-form">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">Todo</p>
          <h2 id="dialogTitle">Neue Karte</h2>
        </div>
        <button id="closeDialogButton" class="icon-button" type="button" aria-label="Schließen">×</button>
      </div>

      <label>
        <span>Titel</span>
        <input id="titleInput" name="title" type="text" required maxlength="180">
      </label>

      <label>
        <span>Status</span>
        <select id="statusInput" name="status"></select>
      </label>

      <div class="field-grid">
        <label>
          <span>Kategorie</span>
          <select id="categoryInput" name="category">
            <option value="">Keine</option>
            <option value="🌐 online">🌐 online</option>
            <option value="🏠 offline">🏠 offline</option>
          </select>
        </label>

        <label>
          <span>Priorität</span>
          <select id="priorityInput" name="priority">
            <option value="">Keine</option>
            <option value="🔴 hoch">🔴 hoch</option>
            <option value="🟡 mittel">🟡 mittel</option>
            <option value="🟢 niedrig">🟢 niedrig</option>
          </select>
        </label>
      </div>

      <label>
        <span>Notiz</span>
        <textarea id="noteInput" name="note" rows="4" placeholder="Optional: Details, Kontext, nächste Schritte"></textarea>
      </label>

      <menu class="dialog-actions">
        <button id="deleteButton" class="danger-button" type="button">Löschen</button>
        <div class="spacer"></div>
        <button class="ghost-button" type="button" id="cancelButton">Abbrechen</button>
        <button class="primary-button" type="submit">Speichern</button>
      </menu>
    </form>
  </dialog>

  <template id="cardTemplate">
    <article class="todo-card">
      <button class="drag-handle" type="button" aria-label="Karte verschieben">⋮⋮</button>
      <button class="todo-main" type="button">
        <span class="todo-title"></span>
        <span class="todo-meta" hidden></span>
        <span class="todo-note" hidden></span>
      </button>
      <div class="todo-actions">
        <button class="mini-button complete-button" type="button" aria-label="Erledigen" title="Erledigen">✓</button>
        <details class="card-menu">
          <summary class="icon-button card-menu-toggle" aria-label="Kartenaktionen" title="Kartenaktionen">⋯</summary>
          <div class="card-menu-panel"></div>
        </details>
      </div>
    </article>
  </template>

  <script src="/kanban.js"></script>
</body>
</html>
